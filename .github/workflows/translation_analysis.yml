name: Translation Quality Analysis

on:
  # Executar semanalmente (Domingo às 23:59)
  schedule:
    - cron: '59 23 * * 0'
  
  # Executar manualmente
  workflow_dispatch:
    inputs:
      force_rerun:
        description: 'Forçar novo teste'
        required: false
        default: 'true'

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -q pandas numpy matplotlib seaborn

      - name: Run Translation Tests
        run: |
          cd analysis
          python scripts/test_translations.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: analysis/results/

      - name: Update README
        run: |
          # O script já atualiza o README
          echo "README atualizado com estatísticas"

      - name: Commit Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "ci: Atualizar estatísticas de tradução [skip ci]"
          git push