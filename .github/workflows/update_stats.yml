name: Update Statistics

on:
  # Quando stats_data.json muda (app enviou novos dados)
  push:
    branches:
      - main
    paths:
      - 'stats_data.json'

  # Manual
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Statistics
        run: |
          # Ler stats do app
          STATS=$(cat stats_data.json)
          
          # Extrair métricas
          TOTAL=$(echo $STATS | python3 -c "import sys,json; print(json.load(sys.stdin).get('totalTranslations', 0))")
          RATED=$(echo $STATS | python3 -c "import sys,json; print(json.load(sys.stdin).get('totalRatings', 0))")
          SUCCESS=$(echo $STATS | python3 -c "import sys,json; print(json.load(sys.stdin).get('successRate', '0'))")
          AVG=$(echo $STATS | python3 -c "import sys,json; print(json.load(sys.stdin).get('averageRating', '0'))")
          
          echo "📊 Estatísticas Atuais:"
          echo "   Total de Traduções: $TOTAL"
          echo "   Traduções Avaliadas: $RATED"
          echo "   Taxa de Sucesso: $SUCCESS%"
          echo "   Nota Média: $AVG/5"

      - name: Generate Badge
        run: |
          # Gerar badge SVG com estatísticas
          SUCCESS=$(cat stats_data.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('successRate', '0'))")
          
          cat > stats_badge.svg << EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="120" height="20">
            <linearGradient id="b" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="a">
              <rect width="120" height="20" rx="3" fill="#fff"/>
            </clipPath>
            <g clip-path="url(#a)">
              <rect width="61" height="20" fill="#4CAF50"/>
              <rect x="61" width="59" height="20" fill="#2196F3"/>
              <rect width="120" height="20" fill="url(#b)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
              <text x="32" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="380">Success</text>
              <text x="32" y="140" transform="scale(.1)" textLength="380">Success</text>
              <text x="78" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="480">$SUCCESS%</text>
              <text x="78" y="140" transform="scale(.1)" textLength="480">$SUCCESS%</text>
            </g>
          </svg>
          EOF
          
          echo "✅ Badge gerado"

      - name: Commit Update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "ci: Atualizar badge de estatísticas"
          git push