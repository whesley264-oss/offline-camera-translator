name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Tipo de release'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - stable

env:
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '(?<=versionName = ")[^"]+')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_type == 'stable'
        uses: softprops/action-gh-release@v1
        with:
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ github.event.inputs.release_type != 'stable' }}
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-beta:
    runs-on: ubuntu-latest
    if: github.event.inputs.release_type == 'beta'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Build debug APK
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Create Beta Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## 🧪 Release Beta
            
            Esta é uma versão de testes.
            
            ### Como instalar:
            1. Baixe o APK abaixo
            2. Habilite "Fontes desconhecidas" no Android
            3. Instale o APK
            
            ### ⚠️ Aviso:
            - Pode conter bugs
            - Não é recomendado para uso diário
          draft: true
          prerelease: true
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    
    steps:
      - name: Summary
        run: |
          echo "## 📦 Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Build concluído com sucesso!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### APK disponível em:" >> $GITHUB_STEP_SUMMARY
            echo "- Release: Artifacts > release-apk" >> $GITHUB_STEP_SUMMARY
            echo "- Debug: Artifacts > debug-apk" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build falhou" >> $GITHUB_STEP_SUMMARY
          fi